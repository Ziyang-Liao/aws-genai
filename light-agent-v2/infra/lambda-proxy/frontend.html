<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Light Assistant — Powered by AWS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================
   CSS Variables & Reset
   ============================================ */
:root {
  --bg0: #08080f;
  --bg1: #0e0e1a;
  --bg2: #161625;
  --bg3: #1e1e32;
  --bg4: #2a2a42;
  --text0: #f0eef6;
  --text1: #c4c0d4;
  --text2: #8a85a0;
  --accent: #8b5cf6;
  --accent-dim: #6d3fd9;
  --accent2: #06d6a0;
  --accent2-dim: #04a87e;
  --danger: #ef4444;
  --warning: #f59e0b;
  --radius: 14px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --transition: 0.3s cubic-bezier(.4,0,.2,1);
  --glow-spread: 60px;
  --font-display: 'Space Grotesk', system-ui, sans-serif;
  --font-body: 'Outfit', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  scroll-behavior: smooth;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: var(--font-body);
  background: var(--bg0);
  color: var(--text0);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.5;
}

/* Background ambient effect */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(139,92,246,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 90%, rgba(6,214,160,0.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* Noise texture overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px;
  pointer-events: none;
  z-index: 0;
}

/* ============================================
   Layout
   ============================================ */
.app {
  position: relative;
  z-index: 1;
  max-width: 1600px;
  margin: 0 auto;
  padding: 20px 28px 40px;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0 28px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo h1 {
  font-family: var(--font-display);
  font-size: clamp(1.1rem, 2.5vw, 1.4rem);
  font-weight: 700;
  background: linear-gradient(135deg, var(--text0) 40%, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.02em;
}

.logo-sub {
  font-size: 0.7rem;
  color: var(--text2);
  letter-spacing: 0.06em;
  margin-top: 1px;
}

.logo-sub strong {
  color: var(--text1);
  font-weight: 600;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.header-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: var(--bg2);
  border-radius: 20px;
  font-size: 0.8rem;
  color: var(--text2);
  border: 1px solid var(--bg3);
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent2);
  box-shadow: 0 0 6px var(--accent2);
}

.status-dot.offline { background: var(--danger); box-shadow: 0 0 6px var(--danger); }

.main-grid {
  display: grid;
  grid-template-columns: 1fr 400px;
  gap: 28px;
  align-items: start;
}

.col-left {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.col-right {
  position: sticky;
  top: 20px;
}

/* ============================================
   Cards
   ============================================ */
.card {
  background: var(--bg1);
  border: 1px solid var(--bg3);
  border-radius: var(--radius);
  overflow: hidden;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--bg3);
}

.card-title {
  font-family: var(--font-display);
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text0);
  letter-spacing: -0.01em;
}

.card-body {
  padding: 20px;
}

/* ============================================
   Living Room Scene (SVG)
   ============================================ */
.scene-wrapper {
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  background: linear-gradient(180deg, #0e0e1c 0%, var(--bg1) 100%);
  border: 1px solid var(--bg3);
  box-shadow: 0 4px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.03);
}

.scene-svg {
  width: 100%;
  height: auto;
  display: block;
  min-height: 420px;
}

/* Light glow transitions */
.scene-svg .light-glow {
  transition: fill 0.8s ease, opacity 0.8s ease, filter 0.8s ease;
}

.scene-svg .light-body {
  transition: fill 0.6s ease, stroke 0.6s ease, opacity 0.6s ease;
}

.scene-svg .ambient-spill {
  transition: fill 0.8s ease, opacity 1s ease;
}

/* Theme animations */
@keyframes twinkle {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

@keyframes flicker {
  0% { opacity: 1; }
  10% { opacity: 0.85; }
  20% { opacity: 1; }
  30% { opacity: 0.9; }
  50% { opacity: 1; }
  70% { opacity: 0.8; }
  80% { opacity: 1; }
  100% { opacity: 0.95; }
}

@keyframes flow {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(30deg); }
}

@keyframes pulse-glow {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

.anim-twinkle { animation: twinkle 2.5s ease-in-out infinite; }
.anim-flicker { animation: flicker 1.5s ease-in-out infinite; }
.anim-flow { animation: flow 4s ease-in-out infinite alternate; }
.anim-pulse { animation: pulse-glow 3s ease-in-out infinite; }

@media (prefers-reduced-motion: reduce) {
  .anim-twinkle, .anim-flicker, .anim-flow, .anim-pulse {
    animation: none !important;
  }
}

/* Scene label tags */
.scene-labels {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.scene-label {
  position: absolute;
  font-size: 0.65rem;
  font-family: var(--font-display);
  font-weight: 500;
  color: var(--text0);
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(8px);
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  pointer-events: auto;
  cursor: pointer;
  transition: background var(--transition), transform var(--transition);
  border: 1px solid rgba(255,255,255,0.08);
}

.scene-label:hover {
  background: rgba(139,92,246,0.4);
  transform: scale(1.05);
}

.scene-label.active {
  background: rgba(139,92,246,0.5);
  border-color: rgba(139,92,246,0.5);
}

/* ============================================
   Theme Presets
   ============================================ */
.themes-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.theme-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 14px 10px;
  background: var(--bg2);
  border: 1.5px solid var(--bg3);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
  color: var(--text1);
  font-family: var(--font-body);
  font-size: 0.78rem;
  font-weight: 500;
}

.theme-btn:hover {
  border-color: var(--bg4);
  background: var(--bg3);
  transform: translateY(-2px);
}

.theme-btn.active {
  border-color: var(--accent);
  background: rgba(139,92,246,0.12);
  color: var(--text0);
  box-shadow: 0 0 20px rgba(139,92,246,0.15);
}

.theme-dots {
  display: flex;
  gap: 4px;
}

.theme-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.1);
}

.theme-name {
  font-family: var(--font-display);
  font-weight: 600;
  letter-spacing: -0.01em;
}

.theme-icon {
  font-size: 1.3rem;
  line-height: 1;
}

/* ============================================
   Device Control Cards
   ============================================ */
.devices-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.device-card {
  background: var(--bg2);
  border: 1px solid var(--bg3);
  border-radius: var(--radius-sm);
  padding: 16px;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}

.device-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--device-color, var(--bg4));
  opacity: var(--device-on, 0);
  transition: all 0.6s ease;
}

.device-card:hover {
  border-color: var(--bg4);
}

.device-card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.device-info {
  display: flex;
  align-items: center;
  gap: 10px;
}

.device-icon {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-xs);
  background: var(--bg3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  transition: all 0.4s ease;
}

.device-card[data-on="true"] .device-icon {
  background: color-mix(in srgb, var(--device-color, var(--accent)) 25%, transparent);
  box-shadow: 0 0 12px color-mix(in srgb, var(--device-color, var(--accent)) 30%, transparent);
}

.device-name {
  font-family: var(--font-display);
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text0);
}

.device-type {
  font-size: 0.68rem;
  color: var(--text2);
  margin-top: 1px;
}

/* Toggle switch */
.toggle {
  position: relative;
  width: 40px;
  height: 22px;
  flex-shrink: 0;
}

.toggle input {
  opacity: 0;
  width: 0;
  height: 0;
}

.toggle-track {
  position: absolute;
  inset: 0;
  background: var(--bg4);
  border-radius: 11px;
  cursor: pointer;
  transition: background var(--transition);
}

.toggle-track::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 16px;
  height: 16px;
  background: var(--text2);
  border-radius: 50%;
  transition: all var(--transition);
}

.toggle input:checked + .toggle-track {
  background: var(--accent);
}

.toggle input:checked + .toggle-track::after {
  transform: translateX(18px);
  background: #fff;
}

/* Brightness slider */
.brightness-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.brightness-label {
  font-size: 0.68rem;
  color: var(--text2);
  width: 14px;
  text-align: center;
}

.brightness-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 6px;
  border-radius: 3px;
  background: linear-gradient(to right, var(--bg4), var(--device-color, var(--accent)));
  outline: none;
  transition: background 0.4s ease;
}

.brightness-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #fff;
  cursor: pointer;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  transition: box-shadow var(--transition);
}

.brightness-slider::-webkit-slider-thumb:hover {
  box-shadow: 0 0 0 4px rgba(255,255,255,0.1), 0 1px 4px rgba(0,0,0,0.4);
}

.brightness-slider::-moz-range-thumb {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #fff;
  cursor: pointer;
  border: none;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}

.brightness-val {
  font-size: 0.72rem;
  font-family: var(--font-display);
  font-weight: 600;
  color: var(--text1);
  min-width: 28px;
  text-align: right;
}

/* Color swatches */
.color-row {
  display: flex;
  align-items: center;
  gap: 5px;
  flex-wrap: wrap;
}

.color-swatch {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
}

.color-swatch:hover {
  transform: scale(1.2);
}

.color-swatch.active {
  border-color: #fff;
  box-shadow: 0 0 8px rgba(255,255,255,0.3);
}

.color-custom {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 1.5px dashed var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.6rem;
  color: var(--text2);
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}

.color-custom:hover {
  border-color: var(--text1);
  color: var(--text1);
}

.color-custom input[type="color"] {
  position: absolute;
  inset: -4px;
  width: 28px;
  height: 28px;
  opacity: 0;
  cursor: pointer;
}

/* ============================================
   Chat Panel
   ============================================ */
.chat-card {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 100px);
  max-height: 780px;
  min-height: 500px;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}

.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

.chat-welcome {
  text-align: center;
  padding: 30px 20px;
}

.chat-welcome-icon {
  font-size: 2.5rem;
  margin-bottom: 12px;
}

.chat-welcome h3 {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 6px;
}

.chat-welcome p {
  color: var(--text2);
  font-size: 0.82rem;
  margin-bottom: 16px;
}

.chat-suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
}

.chat-suggestion {
  padding: 6px 12px;
  background: var(--bg2);
  border: 1px solid var(--bg3);
  border-radius: 20px;
  font-size: 0.72rem;
  color: var(--text2);
  cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font-body);
}

.chat-suggestion:hover {
  background: var(--bg3);
  color: var(--text1);
  border-color: var(--accent);
}

.msg {
  display: flex;
  gap: 10px;
  max-width: 90%;
}

.msg.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}

.msg-avatar {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  flex-shrink: 0;
}

.msg.assistant .msg-avatar {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
}

.msg.user .msg-avatar {
  background: var(--bg3);
}

.msg-bubble {
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 0.84rem;
  line-height: 1.55;
  word-break: break-word;
}

.msg.assistant .msg-bubble {
  background: var(--bg2);
  border: 1px solid var(--bg3);
  color: var(--text1);
  border-top-left-radius: 4px;
}

.msg.user .msg-bubble {
  background: var(--accent-dim);
  color: #fff;
  border-top-right-radius: 4px;
}

.msg-bubble p { margin: 0 0 8px; }
.msg-bubble p:last-child { margin: 0; }
.msg-bubble code {
  background: rgba(0,0,0,0.3);
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 0.82em;
}
.msg-bubble strong { font-weight: 600; color: var(--text0); }

.typing-cursor {
  display: inline-block;
  width: 6px;
  height: 14px;
  background: var(--accent);
  border-radius: 1px;
  margin-left: 2px;
  animation: blink 0.8s step-end infinite;
  vertical-align: text-bottom;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* Chat input */
.chat-input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--bg3);
  display: flex;
  gap: 8px;
  align-items: end;
}

.chat-input {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--bg3);
  border-radius: 12px;
  padding: 10px 14px;
  color: var(--text0);
  font-family: var(--font-body);
  font-size: 0.84rem;
  resize: none;
  min-height: 42px;
  max-height: 120px;
  outline: none;
  transition: border-color var(--transition);
  line-height: 1.4;
}

.chat-input:focus {
  border-color: var(--accent);
}

.chat-input::placeholder {
  color: var(--text2);
}

.chat-send {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  background: var(--accent);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  flex-shrink: 0;
}

.chat-send:hover { background: var(--accent-dim); transform: scale(1.05); }
.chat-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.chat-send svg {
  width: 18px;
  height: 18px;
  fill: #fff;
}

/* ============================================
   Toast Notifications
   ============================================ */
.toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  padding: 12px 18px;
  background: var(--bg2);
  border: 1px solid var(--bg3);
  border-radius: var(--radius-sm);
  font-size: 0.82rem;
  color: var(--text1);
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  backdrop-filter: blur(12px);
  animation: toast-in 0.3s ease;
  max-width: 340px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.toast.success { border-left: 3px solid var(--accent2); }
.toast.error { border-left: 3px solid var(--danger); }
.toast.info { border-left: 3px solid var(--accent); }

@keyframes toast-in {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

/* ============================================
   Responsive
   ============================================ */
@media (max-width: 960px) {
  .main-grid {
    grid-template-columns: 1fr;
  }
  .col-right {
    position: static;
  }
  .chat-card {
    height: 500px;
  }
}

@media (max-width: 640px) {
  .app { padding: 12px 14px 30px; }
  .themes-grid { grid-template-columns: repeat(2, 1fr); }
  .devices-grid { grid-template-columns: 1fr; }
  .header { flex-wrap: wrap; gap: 10px; }
  .chat-card { min-height: 400px; height: 450px; }
}
</style>
</head>
<body>

<div class="app">
  <!-- ========== Header ========== -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M9 18h6M10 22h4M12 2v1M4.2 4.2l.7.7M1 12h1m17 0h1m-3.5-6.1l.7-.7M12 6a6 6 0 016 6c0 2.2-1.2 4.2-3 5.2V18a1 1 0 01-1 1h-4a1 1 0 01-1-1v-.8C7.2 16.2 6 14.2 6 12a6 6 0 016-6z"/></svg>
      </div>
      <div>
        <h1>Light Assistant</h1>
        <p class="logo-sub">Powered by <strong>AWS</strong></p>
      </div>
    </div>
    <div class="header-actions">
      <div class="header-pill">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Online</span>
      </div>
    </div>
  </header>

  <!-- ========== Main Grid ========== -->
  <div class="main-grid">
    <!-- Left Column: Scene + Controls -->
    <div class="col-left">

      <!-- Living Room Scene -->
      <div class="scene-wrapper">
        <svg class="scene-svg" viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg">

  const el = document.createElement('div');

/* ============================================
   State Management
   ============================================ */
const state = {
  devices: {},
  activeTheme: null,
};

// Initialize device states
DEVICES.forEach(d => {
  state.devices[d.id] = { on: false, brightness: 80, color: d.defaultColor };
});

function updateDeviceState(deviceId, changes) {
  Object.assign(state.devices[deviceId], changes);
  updateScene(deviceId);
  updateDeviceCardUI(deviceId);
}

function syncDevicesFromChat(devicesMap) {
  if (!devicesMap) return;
  for (const [devId, s] of Object.entries(devicesMap)) {
    if (state.devices[devId]) {
      Object.assign(state.devices[devId], s);
      updateScene(devId);
      updateDeviceCardUI(devId);
    }
  }
  // Detect and sync active theme from device colors
  detectAndSyncTheme();
}

function detectAndSyncTheme() {
  let matched = null;
  for (const [key, theme] of Object.entries(THEMES)) {
    const allMatch = Object.entries(theme.devices).every(([devId, cfg]) => {
      const ds = state.devices[devId];
      return ds && ds.on && ds.color.toLowerCase() === cfg.color.toLowerCase();
    });
    if (allMatch) { matched = key; break; }
  }
  state.activeTheme = matched;
  $$('.theme-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.theme === matched);
  });
  if (matched) {
    applyThemeAnimations(matched);
  } else {
    clearSceneAnimations();
  }
}

/* ============================================
   Scene Rendering
   ============================================ */
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function updateScene(deviceId) {
  const d = state.devices[deviceId];
  const on = d.on;
  const color = d.color;
  const br = d.brightness / 100;
  const opacity = on ? br : 0;
  const ambientOpacity = on ? br * 0.15 : 0;

  if (deviceId === 'tvb') {
    ['#tvb-glow-top','#tvb-glow-bottom','#tvb-glow-left','#tvb-glow-right'].forEach(sel => {
      const el = $(sel);
      if (el) { el.setAttribute('fill', color); el.setAttribute('opacity', opacity * 0.9); }
    });
    const amb = $('#tvb-ambient');
    if (amb) { amb.setAttribute('fill', color); amb.setAttribute('opacity', ambientOpacity); }
  }

  if (deviceId === 'hexa') {
    // Light up hex cells: top to bottom cascade (tree effect)
    for (let i = 0; i < 10; i++) {
      const cell = $(`#hexa-${i}`);
      if (cell) {
        cell.setAttribute('fill', on ? color : '#1e1e32');
        cell.setAttribute('stroke', on ? hexToRgba(color, 0.4) : '#2a2a42');
        cell.style.opacity = on ? (0.6 + br * 0.4) : 1;
        cell.style.filter = on ? `drop-shadow(0 0 6px ${hexToRgba(color, 0.3)})` : 'none';
        cell.style.transitionDelay = `${i * 0.05}s`;
      }
    }
    // Light up the trunk
    const trunk = $('#hexa-trunk');
    if (trunk) {
      trunk.setAttribute('fill', on ? color : '#1e1e32');
      trunk.setAttribute('stroke', on ? hexToRgba(color, 0.4) : '#2a2a42');
      trunk.style.opacity = on ? (0.5 + br * 0.3) : 1;
      trunk.style.filter = on ? `drop-shadow(0 0 4px ${hexToRgba(color, 0.2)})` : 'none';
    }
    // Light up the star on top of tree
    const star = $('.hexa-star');
    if (star) {
      star.setAttribute('fill', on ? color : '#3a3a55');
      star.setAttribute('opacity', on ? 1 : 0.5);
      star.style.filter = on ? `drop-shadow(0 0 8px ${color})` : 'none';
      star.style.transition = 'all 0.6s ease';
    }
    const amb = $('#hexa-ambient');
    if (amb) { amb.setAttribute('fill', color); amb.setAttribute('opacity', ambientOpacity); }
  }

  if (deviceId === 'rope') {
    const glow = $('#rope-glow');
    const body = $('#rope-body');
    if (glow) { glow.setAttribute('stroke', color); glow.setAttribute('opacity', opacity); }
    if (body) {
      body.setAttribute('stroke', on ? color : '#2a2a42');
      body.style.opacity = on ? (0.5 + br * 0.5) : 1;
      body.style.filter = on ? `drop-shadow(0 0 3px ${color})` : 'none';
    }
    // Eyes and nose
    ['#rope-eye-l','#rope-eye-r'].forEach(sel => {
      const el = $(sel);
      if (el) { el.setAttribute('fill', on ? color : '#2a2a42'); el.style.filter = on ? `drop-shadow(0 0 4px ${color})` : 'none'; }
    });
    const nose = $('#rope-nose');
    if (nose) { nose.setAttribute('stroke', on ? color : '#2a2a42'); nose.style.filter = on ? `drop-shadow(0 0 3px ${color})` : 'none'; }
    const amb = $('#rope-ambient');
    if (amb) { amb.setAttribute('fill', color); amb.setAttribute('opacity', on ? br * 0.12 : 0); }
  }

  if (deviceId === 'ylight') {
    for (let i = 0; i < 7; i++) {
      const panel = $(`#ypanel-${i}`);
      if (panel) {
        const lines = panel.querySelectorAll('line');
        lines.forEach(l => {
          l.setAttribute('stroke', on ? color : '#2a2a42');
          l.style.opacity = on ? (0.7 + br * 0.3) : 1;
          l.style.filter = on ? `drop-shadow(0 0 5px ${color})` : 'none';
          l.style.transition = 'all 0.6s ease';
          l.style.transitionDelay = `${i * 0.05}s`;
        });
      }
    }
    const amb = $('#ylight-ambient');
    if (amb) { amb.setAttribute('fill', color); amb.setAttribute('opacity', on ? br * 0.12 : 0); }
  }
}

function clearSceneAnimations() {
  $$('.anim-twinkle, .anim-flicker, .anim-flow, .anim-pulse').forEach(el => {
    el.classList.remove('anim-twinkle','anim-flicker','anim-flow','anim-pulse');
  });
}

function applyThemeAnimations(themeKey) {
  clearSceneAnimations();
  const theme = THEMES[themeKey];
  if (!theme) return;

  Object.entries(theme.devices).forEach(([devId, cfg]) => {
    if (!cfg.anim) return;
    if (devId === 'tvb') {
      ['#tvb-glow-top','#tvb-glow-bottom','#tvb-glow-left','#tvb-glow-right'].forEach(sel => {
        const el = $(sel);
        if (el) el.classList.add(cfg.anim);
      });
    }
    if (devId === 'hexa') {
      for (let i = 0; i < 10; i++) {
        const el = $(`#hexa-${i}`);
        if (el) el.classList.add(cfg.anim);
      }
    }
    if (devId === 'rope') {
      const el = $('#rope-glow');
      if (el) el.classList.add(cfg.anim);
    }
    if (devId === 'ylight') {
      for (let i = 0; i < 7; i++) {
        const el = $(`#ypanel-${i}`);
        if (el) el.classList.add(cfg.anim);
      }
    }
  });
}

/* ============================================
   Theme Controls
   ============================================ */
function renderThemes() {
  const grid = $('#themesGrid');
  grid.innerHTML = '';
  Object.entries(THEMES).forEach(([key, theme]) => {
    const btn = document.createElement('button');
    btn.className = 'theme-btn';
    btn.dataset.theme = key;
    btn.innerHTML = `
      <span class="theme-icon">${theme.icon}</span>
      <span class="theme-dots">${theme.colors.map(c => `<span class="theme-dot" style="background:${c}"></span>`).join('')}</span>
      <span class="theme-name">${theme.name}</span>
    `;
    btn.onclick = () => applyTheme(key);
    grid.appendChild(btn);
  });
}

function applyTheme(key) {
  const theme = THEMES[key];
  if (!theme) return;

  state.activeTheme = key;

  // Update all devices locally
  Object.entries(theme.devices).forEach(([devId, cfg]) => {
    state.devices[devId].on = true;
    state.devices[devId].color = cfg.color;
    state.devices[devId].brightness = cfg.brightness;
    updateScene(devId);
    updateDeviceCardUI(devId);
  });

  applyThemeAnimations(key);

  // Update active state on buttons
  $$('.theme-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.theme === key);
  });

  toast(`Theme: ${theme.name}`, 'success');
}

function resetTheme() {
  state.activeTheme = null;
  clearSceneAnimations();
  DEVICES.forEach(d => {
    state.devices[d.id].on = false;
    updateScene(d.id);
    updateDeviceCardUI(d.id);
  });
  $$('.theme-btn').forEach(btn => btn.classList.remove('active'));
  toast('Lights reset', 'info');
}

/* ============================================
   Device Control Cards
   ============================================ */
function renderDeviceCards() {
  const grid = $('#devicesGrid');
  grid.innerHTML = '';
  DEVICES.forEach(d => {
    const ds = state.devices[d.id];
    const card = document.createElement('div');
    card.className = 'device-card';
    card.id = `card-${d.id}`;
    card.dataset.on = ds.on;
    card.style.setProperty('--device-color', ds.color);
    card.style.setProperty('--device-on', ds.on ? '1' : '0');

    card.innerHTML = `
      <div class="device-card-head">
        <div class="device-info">
          <div class="device-icon">${d.icon}</div>
          <div>
            <div class="device-name">${d.name}</div>
            <div class="device-type">${d.type}</div>
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" ${ds.on ? 'checked' : ''} data-device="${d.id}" data-action="power">
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="brightness-row">
        <span class="brightness-label">&#9728;</span>
        <input type="range" class="brightness-slider" min="1" max="100" value="${ds.brightness}" data-device="${d.id}" data-action="brightness">
        <span class="brightness-val" id="brval-${d.id}">${ds.brightness}%</span>
      </div>
      <div class="color-row">
        ${COLOR_PRESETS.map(c => `<div class="color-swatch${ds.color === c ? ' active' : ''}" style="background:${c}" data-device="${d.id}" data-color="${c}"></div>`).join('')}
        <div class="color-custom" title="Custom color">
          +
          <input type="color" value="${ds.color}" data-device="${d.id}" data-action="custom-color">
        </div>
      </div>
    `;

    grid.appendChild(card);
  });

  // Event delegation
  grid.addEventListener('change', e => {
    const t = e.target;
    const devId = t.dataset.device;
    if (!devId) return;

    if (t.dataset.action === 'power') {
      updateDeviceState(devId, { on: t.checked });
      if (state.activeTheme) { state.activeTheme = null; $$('.theme-btn').forEach(b => b.classList.remove('active')); clearSceneAnimations(); }
    }
    if (t.dataset.action === 'custom-color') {
      updateDeviceState(devId, { color: t.value });
      updateSwatchActive(devId, t.value);
    }
  });

  grid.addEventListener('input', e => {
    const t = e.target;
    const devId = t.dataset.device;
    if (!devId) return;

    if (t.dataset.action === 'brightness') {
      const val = parseInt(t.value);
      state.devices[devId].brightness = val;
      $(`#brval-${devId}`).textContent = val + '%';
      updateScene(devId);
    }
  });

  grid.addEventListener('click', e => {
    const swatch = e.target.closest('.color-swatch');
    if (!swatch) return;
    const devId = swatch.dataset.device;
    const color = swatch.dataset.color;
    updateDeviceState(devId, { color });
    updateSwatchActive(devId, color);
    if (state.activeTheme) { state.activeTheme = null; $$('.theme-btn').forEach(b => b.classList.remove('active')); clearSceneAnimations(); }
  });
}

function updateDeviceCardUI(deviceId) {
  const card = $(`#card-${deviceId}`);
  if (!card) return;
  const ds = state.devices[deviceId];

  card.dataset.on = ds.on;
  card.style.setProperty('--device-color', ds.color);
  card.style.setProperty('--device-on', ds.on ? '1' : '0');

  const toggle = $(`input[data-device="${deviceId}"][data-action="power"]`, card);
  if (toggle) toggle.checked = ds.on;

  const slider = $(`input[data-device="${deviceId}"][data-action="brightness"]`, card);
  if (slider) slider.value = ds.brightness;

  const brVal = $(`#brval-${deviceId}`);
  if (brVal) brVal.textContent = ds.brightness + '%';

  // Update slider gradient
  if (slider) {
    slider.style.background = `linear-gradient(to right, var(--bg4), ${ds.color})`;
  }

  updateSwatchActive(deviceId, ds.color);
}

function updateSwatchActive(deviceId, color) {
  const card = $(`#card-${deviceId}`);
  if (!card) return;
  $$('.color-swatch', card).forEach(s => {
    s.classList.toggle('active', s.dataset.color === color);
  });
}

/* ============================================
   Scene Label Click
   ============================================ */
$$('.scene-label').forEach(label => {
  label.addEventListener('click', () => {
    const devId = label.dataset.device;
    const card = $(`#card-${devId}`);
    if (card) {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.style.boxShadow = '0 0 0 2px var(--accent)';
      setTimeout(() => card.style.boxShadow = '', 1500);
    }
  });
});

/* ============================================
   Chat System
   ============================================ */
let chatBusy = false;
let chatSessionId = localStorage.getItem('lightAssistantSessionId') || (() => {
  const id = 'sess-' + crypto.randomUUID();
  localStorage.setItem('lightAssistantSessionId', id);
  return id;
})();

function addMessage(role, content) {
  // Remove welcome if still present
  const welcome = $('.chat-welcome');
  if (welcome) welcome.remove();

  const msgs = $('#chatMessages');
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  msg.innerHTML = `
    <div class="msg-avatar">${role === 'assistant' ? '\uD83D\uDCA1' : '\uD83D\uDC64'}</div>
    <div class="msg-bubble">${renderMarkdown(content)}</div>
  `;
  msgs.appendChild(msg);
  msgs.scrollTop = msgs.scrollHeight;
  return msg;
}

function addStreamingMessage() {
  const welcome = $('.chat-welcome');
  if (welcome) welcome.remove();

  const msgs = $('#chatMessages');
  const msg = document.createElement('div');
  msg.className = 'msg assistant';
  msg.innerHTML = `
    <div class="msg-avatar">\uD83D\uDCA1</div>
    <div class="msg-bubble"><span class="typing-cursor"></span></div>
  `;
  msgs.appendChild(msg);
  msgs.scrollTop = msgs.scrollHeight;
  return msg;
}

function renderMarkdown(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}

async function sendChat(message) {
  if (chatBusy || !message.trim()) return;
  chatBusy = true;
  $('#chatSend').disabled = true;

  addMessage('user', message);

  const msgEl = addStreamingMessage();
  const bubble = $('.msg-bubble', msgEl);

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: message, session_id: chatSessionId }),
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const data = await resp.json();
    const cursor = $('.typing-cursor', bubble);
    if (cursor) cursor.remove();

    bubble.innerHTML = renderMarkdown(data.response || data.error || 'No response');

    // 智能同步：对比前后端状态，只更新真正发生变化的设备
    if (data.deviceState) {
      for (const [devId, backendState] of Object.entries(data.deviceState)) {
        if (!state.devices[devId]) continue;
        const local = state.devices[devId];
        // 检查这个设备的状态是否真的和本地不同
        const changed = (local.on !== backendState.on) ||
                        (local.brightness !== backendState.brightness) ||
                        (local.color !== backendState.color);
        if (changed) {
          Object.assign(state.devices[devId], backendState);
          updateScene(devId);
          updateDeviceCardUI(devId);
        }
      }
      detectAndSyncTheme();
    }

    // 动画引擎：后端返回 animation 指令时，前端驱动循环
    if (data.animation) {
      if (data.animation.stop) {
        // 停止动画
        if (window._animationTimer) { clearInterval(window._animationTimer); window._animationTimer = null; }
      } else if (data.animation.keyframes) {
        // 启动前端动画循环
        if (window._animationTimer) clearInterval(window._animationTimer);
        const frames = data.animation.keyframes;
        const ms = data.animation.interval_ms || 500;
        let fi = 0;
        window._animationTimer = setInterval(() => {
          const frame = frames[fi % frames.length];
          for (const [devId, s] of Object.entries(frame)) {
            if (!state.devices[devId]) continue;
            if (s.on !== undefined) state.devices[devId].on = s.on;
            if (s.brightness !== undefined) state.devices[devId].brightness = s.brightness;
            if (s.color !== undefined) state.devices[devId].color = s.color;
            updateScene(devId);
            updateDeviceCardUI(devId);
          }
          fi++;
        }, ms);
      }
    }
  } catch (err) {
    const cursor = $('.typing-cursor', bubble);
    if (cursor) cursor.remove();
    bubble.innerHTML = renderMarkdown(`Connection error: ${err.message}`);
  } finally {
    chatBusy = false;
    $('#chatSend').disabled = false;
  }
}

// Chat input handlers
$('#chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const val = e.target.value.trim();
    if (val) { sendChat(val); e.target.value = ''; e.target.style.height = 'auto'; }
  }
});

$('#chatSend').addEventListener('click', () => {
  const input = $('#chatInput');
  const val = input.value.trim();
  if (val) { sendChat(val); input.value = ''; input.style.height = 'auto'; }
});

// Auto-resize textarea
$('#chatInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Suggestion clicks
$('#chatSuggestions').addEventListener('click', e => {
  const btn = e.target.closest('.chat-suggestion');
  if (btn) sendChat(btn.textContent);
});

// Clear chat + reset session
$('#chatClear').addEventListener('click', () => {
  // Generate new session so agent forgets previous context
  chatSessionId = 'sess-' + crypto.randomUUID();
  localStorage.setItem('lightAssistantSessionId', chatSessionId);

  const msgs = $('#chatMessages');
  msgs.innerHTML = `
    <div class="chat-welcome">
      <div class="chat-welcome-icon">&#128161;</div>
      <h3>Light Assistant</h3>
      <p>Control your lights with natural language</p>
      <div class="chat-suggestions" id="chatSuggestions">
        <button class="chat-suggestion">Turn on all lights</button>
        <button class="chat-suggestion">Set aurora theme</button>
        <button class="chat-suggestion">Dim the living room</button>
        <button class="chat-suggestion">Make it cozy and warm</button>
        <button class="chat-suggestion">Party mode!</button>
      </div>
    </div>
  `;
  $('#chatSuggestions').addEventListener('click', e => {
    const btn = e.target.closest('.chat-suggestion');
    if (btn) sendChat(btn.textContent);
  });
});

// Reset theme button
$('#themeOff').addEventListener('click', resetTheme);

/* ============================================
   Boot
   ============================================ */
async function init() {
  renderThemes();
  renderDeviceCards();

  // Initialize all scenes as off
  DEVICES.forEach(d => updateScene(d.id));

  // 页面加载时展示 aurora 主题（后端初始状态已同步为 aurora）
  setTimeout(() => applyTheme('aurora'), 800);
}

init();
</script>
